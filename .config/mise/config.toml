[tools]
jq = "latest"
fzf = "latest"
bat = "latest"
zoxide = "latest"
ripgrep = "latest"
pipx = "latest"
"aqua:go-task/task" = "latest"

#AI
claude-code = "latest"
codex = "latest"
"pipx:graphifyy" = "latest"
# "npm:freebuff" = "latest"

#Language runtimes (global defaults) 
node = "lts"
go = "1.26"
rust = "stable"

#Package managers 
pnpm = "latest"
yarn = "latest"
bun = "latest"

#Programs
#neovim = "latest"

#npm
"npm:@shopify/cli" = "latest"
"npm:dotenv-cli" = "latest"
"npm:tsx" = "latest"
"npm:playwright" = "latest"


#cli tools
"cloudflared" = "latest"
"aws-cli" = "latest"

[settings]
# Automatically install tools when entering a directory
auto_install = true
# Trust config files automatically (no prompt)
trusted_config_paths = ["~"]
# Keep output clean
verbose = false
